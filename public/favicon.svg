<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Rounded white background for high contrast on both dark and light browser themes -->
  <rect width="100%" height="100%" rx="22" fill="#FFFFFF" />
  
  <!-- Serif Monogram SN in Dark Navy -->
  <text x="25" y="65" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="normal" fill="#0D1B2A" letter-spacing="-2">S</text>
  <text x="47" y="71" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="normal" fill="#0D1B2A">N</text>
  
  <!-- Gold arc from the main SN Global Group logo -->
  <path d="M 33 30 C 53 21, 72 34, 75 48" fill="none" stroke="#D4AF37" stroke-width="2.2" stroke-linecap="round" />
</svg>
